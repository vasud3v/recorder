name: GoondVR

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Prevent multiple workflows from running simultaneously
concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && format('goondvr-manual-{0}', github.run_id) || 'goondvr-recording' }}
  cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' }}  # Cancel old manual runs, queue scheduled runs

on:
  push:
    tags:
      - "v*"
    branches:
      - main
    paths:
      - '.github/channels.json'
  schedule:
    - cron: '0 */5 * * *'  # Every 5 hours - primary schedule
    - cron: '30 */6 * * *'  # Every 6 hours at :30 - backup restart trigger
  workflow_dispatch:
    inputs:
      max_duration:
        description: 'Recording chunk duration (minutes)'
        required: false
        default: '45'
        type: choice
        options:
          - '1'
          - '15'
          - '30'
          - '45'
          - '60'
          - '90'
          - '120'
          - '180'
          - '240'
      resolution:
        description: 'Target resolution (0 = source quality)'
        required: false
        default: '9999'
        type: choice
        options:
          - '9999'
          - '1080'
          - '720'
          - '480'
      framerate:
        description: 'Target framerate (0 = source framerate)'
        required: false
        default: '60'
        type: choice
        options:
          - '60'
          - '30'
          - '24'
      interval:
        description: 'Check interval when offline (minutes)'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '5'
          - '10'
      debug:
        description: 'Enable debug logging'
        required: false
        default: false
        type: boolean

jobs:
  # Release job - only runs on tags
  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      
      - name: Build binaries
        run: |
          mkdir -p dist
          go mod download
          GOOS=linux   GOARCH=amd64  go build -ldflags="-s -w" -o dist/linux_amd64_goondvr .
          GOOS=windows GOARCH=amd64  go build -ldflags="-s -w" -o dist/windows_amd64_goondvr.exe .
          GOOS=darwin  GOARCH=amd64  go build -ldflags="-s -w" -o dist/darwin_amd64_goondvr .
          GOOS=darwin  GOARCH=arm64  go build -ldflags="-s -w" -o dist/darwin_arm64_goondvr .
      
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
      
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: docker/setup-buildx-action@v3
      
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/heapofchaos/goondvr:latest
            ghcr.io/heapofchaos/goondvr:${{ github.ref_name }}

  # Load channels for recording
  setup:
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-latest
    outputs:
      channels: ${{ steps.load.outputs.channels }}
      has-channels: ${{ steps.load.outputs.has-channels }}
    steps:
      - uses: actions/checkout@v4
      - id: load
        run: |
          if [ ! -f .github/channels.json ]; then
            echo "channels=[]" >> $GITHUB_OUTPUT
            echo "has-channels=false" >> $GITHUB_OUTPUT
            echo "Warning: .github/channels.json not found"
            exit 0
          fi
          
          # Validate JSON syntax
          if ! jq empty .github/channels.json 2>/dev/null; then
            echo "Error: Invalid JSON in channels.json"
            echo "channels=[]" >> $GITHUB_OUTPUT
            echo "has-channels=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          CHANNELS=$(cat .github/channels.json | jq -c '.channels')
          
          # Validate channels array exists and is not empty
          if [ "$CHANNELS" = "[]" ] || [ "$CHANNELS" = "null" ] || [ -z "$CHANNELS" ]; then
            echo "channels=[]" >> $GITHUB_OUTPUT
            echo "has-channels=false" >> $GITHUB_OUTPUT
            echo "No channels configured"
          else
            # Validate each channel has required fields
            VALID_CHANNELS=$(echo "$CHANNELS" | jq -c '[.[] | select(.username != null and .username != "" and .site != null and .site != "")]')
            
            if [ "$VALID_CHANNELS" = "[]" ]; then
              echo "channels=[]" >> $GITHUB_OUTPUT
              echo "has-channels=false" >> $GITHUB_OUTPUT
              echo "No valid channels found (missing username or site)"
            else
              echo "channels=$VALID_CHANNELS" >> $GITHUB_OUTPUT
              echo "has-channels=true" >> $GITHUB_OUTPUT
              echo "Found $(echo "$VALID_CHANNELS" | jq 'length') valid channel(s)"
            fi
          fi

  # Record all channels in parallel (24/7)
  record:
    if: "!startsWith(github.ref, 'refs/tags/') && needs.setup.outputs.has-channels == 'true'"
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 390  # 6.5 hours - allows monitor to complete (6h) + buffer
    strategy:
      matrix:
        channel: ${{ fromJson(needs.setup.outputs.channels) }}
      fail-fast: false
      max-parallel: 20
    
    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191
        env:
          LOG_LEVEL: info
          CAPTCHA_SOLVER: none
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg bc jq
      
      - name: Build
        run: |
          go mod download
          go build -o goondvr .
      
      - uses: actions/cache/restore@v4
        continue-on-error: true
        with:
          path: |
            conf/
            database/
            videos/
          key: state-${{ matrix.channel.username }}-${{ github.run_id }}
          restore-keys: |
            state-${{ matrix.channel.username }}-
            state-${{ matrix.channel.username }}-resume-
      
      - name: Wait for FlareSolverr
        run: |
          echo "Waiting for FlareSolverr to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:8191/v1 > /dev/null 2>&1; then
              echo "FlareSolverr is ready!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          
          # Test FlareSolverr with appropriate timeout
          echo "Testing FlareSolverr..."
          curl -s --max-time 90 -X POST http://localhost:8191/v1 \
            -H "Content-Type: application/json" \
            -d '{"cmd":"request.get","url":"https://chaturbate.com","maxTimeout":60000}' | jq . || {
              echo "⚠️  FlareSolverr test failed or timed out"
            }
      
      - name: Record
        id: record
        env:
          COOKIES: ${{ secrets.CHATURBATE_COOKIES }}
          USER_AGENT: ${{ secrets.USER_AGENT }}
          FLARESOLVERR_URL: http://localhost:8191/v1
        run: |
          mkdir -p videos conf database/backups processing-queue
          
          # Check for resumed recordings
          EXISTING_FILES=$(find videos -type f \( -name "*.ts" -o -name "*.mp4" \) 2>/dev/null | wc -l || echo "0")
          if [ "$EXISTING_FILES" -gt 0 ]; then
            echo "=== Resume Detected ==="
            echo "Found $EXISTING_FILES existing recording(s) from previous run"
            echo "Will continue recording and mark completed files"
            echo "======================="
          fi
          
          # Check available disk space
          echo "=== Disk Space Check ==="
          AVAILABLE_GB=$(df -BG . | awk 'NR==2 {print $4}' | sed 's/G//')
          echo "Available disk space: ${AVAILABLE_GB}GB"
          
          if [ "$AVAILABLE_GB" -lt 3 ]; then
            echo "ERROR: Insufficient disk space (need at least 3GB, have ${AVAILABLE_GB}GB)"
            exit 1
          fi
          
          echo "✓ Disk space check passed"
          echo "========================"
          
          # Sanitize cookies - remove any newlines or control characters
          CLEAN_COOKIES=$(echo "$COOKIES" | tr -d '\n\r\t' | tr -s ' ')
          CLEAN_UA=$(echo "$USER_AGENT" | tr -d '\n\r\t' | tr -s ' ')
          
          # Check if secrets are configured
          if [ -z "$CLEAN_COOKIES" ] || [ "$CLEAN_COOKIES" = " " ]; then
            echo "⚠️  WARNING: CHATURBATE_COOKIES secret is empty or not set"
            echo "Some features may not work without authentication"
          fi
          
          if [ -z "$CLEAN_UA" ] || [ "$CLEAN_UA" = " " ]; then
            echo "⚠️  WARNING: USER_AGENT secret is empty or not set"
            CLEAN_UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
            echo "Using default user agent"
          fi
          
          # Debug: Show cookie length (not content for security)
          echo "Cookie string length: ${#CLEAN_COOKIES}"
          echo "User agent length: ${#CLEAN_UA}"
          
          # Create settings.json - DISABLE upload, only record
          jq -n \
            --arg cookies "$CLEAN_COOKIES" \
            --arg ua "$CLEAN_UA" \
            '{
              cookies: $cookies,
              user_agent: $ua,
              finalize_mode: "none",
              enable_gofile_upload: false,
              completed_dir: "",
              ffmpeg_encoder: "libx264",
              ffmpeg_container: "mp4",
              ffmpeg_quality: 23,
              ffmpeg_preset: "medium"
            }' > conf/settings.json
          
          # Debug: Verify settings.json was created properly
          echo "Settings file created, size: $(wc -c < conf/settings.json) bytes"
          
          # Start background monitor for disk space and file marking
          (
            RECORDING_STARTED=false
            OFFLINE_COUNT=0
            MAX_OFFLINE_CHECKS=3  # Stop after 3 consecutive offline checks post-recording
            START_TIME=$(date +%s)
            MAX_MONITOR_TIME=$((5 * 3600))  # 5 hours (less than job timeout of 6.5h)
            
            while true; do
              # Check if monitor has been running too long
              CURRENT_TIME=$(date +%s)
              ELAPSED=$((CURRENT_TIME - START_TIME))
              
              if [ $ELAPSED -gt $MAX_MONITOR_TIME ]; then
                echo "⏱️  Monitor timeout reached (5 hours) - stopping"
                pkill -f goondvr || true
                break
              fi
              
              sleep 60  # Check every minute
              
              # Monitor disk space
              AVAILABLE_GB=$(df -BG . | awk 'NR==2 {print $4}' | sed 's/G//')
              USED_PERCENT=$(df -h . | awk 'NR==2 {print $5}' | sed 's/%//')
              
              # Show current recording status
              echo "=== Recording Status ($(date)) ==="
              echo "Disk: ${AVAILABLE_GB}GB available (${USED_PERCENT}% used)"
              
              # Check if we have any video files
              VIDEO_COUNT=$(find videos -type f \( -name "*.ts" -o -name "*.mp4" \) 2>/dev/null | wc -l || echo "0")
              
              if [ "$VIDEO_COUNT" -gt 0 ]; then
                RECORDING_STARTED=true
                OFFLINE_COUNT=0  # Reset offline count when we have files
                find videos -type f \( -name "*.ts" -o -name "*.mp4" \) -exec ls -lh {} \; 2>/dev/null | head -10
              else
                echo "No files yet"
                
                # If recording started but now no new files, increment offline counter
                if [ "$RECORDING_STARTED" = "true" ]; then
                  OFFLINE_COUNT=$((OFFLINE_COUNT + 1))
                  echo "⚠️  No activity detected (check $OFFLINE_COUNT/$MAX_OFFLINE_CHECKS)"
                  
                  if [ $OFFLINE_COUNT -ge $MAX_OFFLINE_CHECKS ]; then
                    echo "🛑 Stream appears to have ended - stopping recording to process files"
                    pkill -f goondvr || true
                    break
                  fi
                fi
              fi
              
              echo "================================"
              
              # Warn if disk space is low
              if [ "$AVAILABLE_GB" -lt 2 ]; then
                echo "⚠️  WARNING: Low disk space (${AVAILABLE_GB}GB remaining)"
              fi
              
              # Emergency stop if critically low
              if [ "$AVAILABLE_GB" -lt 1 ]; then
                echo "🛑 CRITICAL: Disk space exhausted (${AVAILABLE_GB}GB remaining)"
                echo "Stopping recording to prevent job failure..."
                pkill -f goondvr || true
                break
              fi
              
              # Find .ts and .mp4 files that haven't been uploaded yet (limit to 10 per iteration)
              find videos -type f \( -name "*.ts" -o -name "*.mp4" \) 2>/dev/null | head -10 | while read VIDEO_FILE; do
                if [ -f "$VIDEO_FILE" ]; then
                  # Skip if already marked
                  MARKER="${VIDEO_FILE}.uploaded"
                  if [ -f "$MARKER" ]; then
                    continue
                  fi
                  
                  # Check if file is still being written (size changing)
                  SIZE1=$(stat -c%s "$VIDEO_FILE" 2>/dev/null || echo "0")
                  sleep 2
                  SIZE2=$(stat -c%s "$VIDEO_FILE" 2>/dev/null || echo "0")
                  
                  # If size is stable and non-zero, file is complete
                  if [ "$SIZE1" = "$SIZE2" ] && [ "$SIZE1" -gt 0 ]; then
                    echo "Marking completed file for upload: $(basename "$VIDEO_FILE") (${SIZE1} bytes)"
                    touch "$MARKER"
                    
                    # Save to cache immediately so process job can access it
                    # Use a unique key with timestamp to avoid conflicts
                    CACHE_KEY="videos-${{ matrix.channel.username }}-${{ github.run_id }}-$(date +%s)"
                    echo "Saving to cache: $CACHE_KEY"
                    # Note: Can't call actions from within script, cache will be saved at end of job
                  fi
                fi
              done
            done
          ) &
          UPLOADER_PID=$!
          
          # Set recording parameters (use workflow inputs if provided, otherwise defaults)
          MAX_DURATION="${{ inputs.max_duration || '45' }}"
          RESOLUTION="${{ inputs.resolution || '9999' }}"
          FRAMERATE="${{ inputs.framerate || '60' }}"
          INTERVAL="${{ inputs.interval || '1' }}"
          DEBUG_FLAG="${{ inputs.debug == true && '--debug' || '' }}"
          
          echo "=== Recording Parameters ==="
          echo "Max duration: ${MAX_DURATION} minutes"
          echo "Resolution: ${RESOLUTION}p"
          echo "Framerate: ${FRAMERATE}fps"
          echo "Check interval: ${INTERVAL} minute(s)"
          echo "Debug: ${{ inputs.debug || false }}"
          echo "============================"
          
          # Start recording with a wrapper that monitors for stream end
          (
            # Track if we've recorded anything
            RECORDED_SOMETHING=false
            CONSECUTIVE_OFFLINE=0
            MAX_CONSECUTIVE_OFFLINE=5  # Stop after 5 consecutive offline checks (5 * interval minutes)
            TOTAL_ATTEMPTS=0
            MAX_INITIAL_ATTEMPTS=30  # Max attempts before first recording (30 * interval = 30 minutes with interval=1)
            
            # Calculate timeout based on max_duration (add 5 minutes buffer)
            RECORDING_TIMEOUT=$((MAX_DURATION + 5))
            echo "Recording timeout set to ${RECORDING_TIMEOUT} minutes (max_duration + 5 min buffer)"
            
            while true; do
              echo "Starting recording attempt..."
              TOTAL_ATTEMPTS=$((TOTAL_ATTEMPTS + 1))
              
              # Record without conversion/upload - just save video files
              # Timeout is max_duration + 5 minutes to allow for chunk completion
              timeout ${RECORDING_TIMEOUT}m ./goondvr \
                -u "${{ matrix.channel.username }}" \
                --site "${{ matrix.channel.site }}" \
                -resolution "$RESOLUTION" \
                -framerate "$FRAMERATE" \
                -interval "$INTERVAL" \
                -max-duration "$MAX_DURATION" \
                -max-filesize 0 \
                $DEBUG_FLAG
              
              EXIT_CODE=$?
              echo "Recording exited with code $EXIT_CODE"
              
              # Explain exit code
              if [ $EXIT_CODE -eq 124 ]; then
                echo "⏱️  Recording timeout reached (${RECORDING_TIMEOUT} minutes)"
                echo "This is normal - checking if stream is still active..."
              elif [ $EXIT_CODE -eq 0 ]; then
                echo "✓ Recording completed normally"
              else
                echo "Recording exited with code $EXIT_CODE"
              fi
              
              # Check if we have any video files
              VIDEO_COUNT=$(find videos -type f \( -name "*.ts" -o -name "*.mp4" \) 2>/dev/null | wc -l || echo "0")
              
              if [ "$VIDEO_COUNT" -gt 0 ]; then
                RECORDED_SOMETHING=true
                TOTAL_ATTEMPTS=0  # Reset attempt counter once recording starts
                echo "✓ Found $VIDEO_COUNT video file(s)"
              fi
              
              # If we've recorded something and keep getting offline, stop
              if [ "$RECORDED_SOMETHING" = "true" ]; then
                CONSECUTIVE_OFFLINE=$((CONSECUTIVE_OFFLINE + 1))
                echo "Stream offline check $CONSECUTIVE_OFFLINE/$MAX_CONSECUTIVE_OFFLINE"
                
                if [ $CONSECUTIVE_OFFLINE -ge $MAX_CONSECUTIVE_OFFLINE ]; then
                  echo "🎬 Stream has ended - proceeding to upload"
                  break
                fi
              else
                # If never recorded and too many attempts, stop to allow restart
                if [ $TOTAL_ATTEMPTS -ge $MAX_INITIAL_ATTEMPTS ]; then
                  echo "⏸️  Streamer offline after $TOTAL_ATTEMPTS attempts - will retry on next run"
                  break
                fi
                echo "Streamer offline (attempt $TOTAL_ATTEMPTS/$MAX_INITIAL_ATTEMPTS)"
              fi
              
              # If timeout (124), continue recording
              if [ $EXIT_CODE -eq 124 ]; then
                echo "⏱️  ${RECORDING_TIMEOUT}-minute check timeout - continuing..."
                CONSECUTIVE_OFFLINE=0  # Reset since we're actively recording
                continue
              fi
              
              # Wait before retry
              echo "Waiting ${INTERVAL} minute(s) before retry..."
              sleep $((INTERVAL * 60))
            done
          ) || {
            EXIT_CODE=$?
            echo "Recording wrapper ended with code $EXIT_CODE"
          }
          
          # Stop the background monitor
          echo "Stopping background monitor..."
          kill $UPLOADER_PID 2>/dev/null || true
          sleep 2
          
          # Force kill if still running
          if kill -0 $UPLOADER_PID 2>/dev/null; then
            echo "Force killing monitor process..."
            kill -9 $UPLOADER_PID 2>/dev/null || true
          fi
          
          echo ""
          echo "=== Finalizing Recording ==="
          
          # Give a moment for any final writes
          sleep 5
          
          # Mark any remaining files as complete (only if non-empty)
          echo "Marking all completed files..."
          MARKED_COUNT=0
          TEMP_MARKER_LIST=$(mktemp)
          
          find videos -type f \( -name "*.ts" -o -name "*.mp4" \) 2>/dev/null | while read VIDEO_FILE; do
            if [ -f "$VIDEO_FILE" ]; then
              FILE_SIZE=$(stat -c%s "$VIDEO_FILE" 2>/dev/null || echo "0")
              MARKER="${VIDEO_FILE}.uploaded"
              
              if [ "$FILE_SIZE" -gt 0 ]; then
                if [ ! -f "$MARKER" ]; then
                  touch "$MARKER"
                  echo "✓ Marked: $(basename "$VIDEO_FILE") (${FILE_SIZE} bytes)"
                  echo "1" >> "$TEMP_MARKER_LIST"
                fi
              else
                echo "⚠️  Skipping empty file: $(basename "$VIDEO_FILE")"
                rm -f "$VIDEO_FILE"
              fi
            fi
          done
          
          MARKED_COUNT=$(wc -l < "$TEMP_MARKER_LIST" 2>/dev/null || echo "0")
          rm -f "$TEMP_MARKER_LIST"
          echo "Marked $MARKED_COUNT file(s) for upload"
          
          # List completed recordings
          echo "=== Completed Recordings ==="
          echo "Videos directory contents:"
          ls -laR videos/ 2>/dev/null || echo "Videos directory not found or empty"
          echo ""
          echo "All video files:"
          find videos -type f \( -name "*.ts" -o -name "*.mp4" \) -exec ls -lh {} \; 2>/dev/null || echo "No video files found"
          echo ""
          echo "All .uploaded markers:"
          find videos -type f -name "*.uploaded" -exec ls -lh {} \; 2>/dev/null || echo "No .uploaded markers found"
          echo "======================"
      
      - name: Check artifact size before upload
        if: always()
        id: check-size
        run: |
          if [ -d videos ]; then
            TOTAL_SIZE=$(du -sb videos 2>/dev/null | cut -f1 || echo "0")
            TOTAL_GB=$(echo "scale=2; $TOTAL_SIZE / 1024 / 1024 / 1024" | bc)
            echo "Total artifact size: ${TOTAL_GB}GB"
            echo "size_gb=$TOTAL_GB" >> $GITHUB_OUTPUT
            
            # Warn if approaching 10GB limit
            if (( $(echo "$TOTAL_GB > 8" | bc -l) )); then
              echo "⚠️  WARNING: Artifact size (${TOTAL_GB}GB) approaching 10GB limit"
              echo "Consider splitting into multiple artifacts"
            fi
            
            # Check if we need to split
            if (( $(echo "$TOTAL_GB > 9" | bc -l) )); then
              echo "needs_split=true" >> $GITHUB_OUTPUT
              echo "🔀 Artifact too large, will split into chunks"
            else
              echo "needs_split=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "size_gb=0" >> $GITHUB_OUTPUT
            echo "needs_split=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload raw recordings (normal)
        if: always() && steps.check-size.outputs.needs_split != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: raw-videos-${{ matrix.channel.username }}-${{ github.run_number }}
          path: |
            videos/**/*.ts
            videos/**/*.mp4
            videos/**/*.uploaded
          retention-days: 1
          if-no-files-found: ignore
          compression-level: 0
      
      - name: Split large recordings
        if: always() && steps.check-size.outputs.needs_split == 'true'
        run: |
          echo "⚠️  Artifact size exceeds safe limit - cleaning up old files"
          
          # Delete oldest files until under 8GB
          TARGET_SIZE=$((8 * 1024 * 1024 * 1024))  # 8GB target
          MAX_ITERATIONS=100  # Safety limit to prevent infinite loop
          ITERATION_COUNT=0
          
          while true; do
            ITERATION_COUNT=$((ITERATION_COUNT + 1))
            
            if [ $ITERATION_COUNT -gt $MAX_ITERATIONS ]; then
              echo "⚠️  Reached maximum iterations ($MAX_ITERATIONS) - stopping cleanup"
              break
            fi
            
            CURRENT_SIZE=$(du -sb videos 2>/dev/null | cut -f1 || echo "0")
            if [ "$CURRENT_SIZE" -le "$TARGET_SIZE" ]; then
              break
            fi
            
            # Find and delete oldest video file
            OLDEST=$(find videos -type f \( -name "*.ts" -o -name "*.mp4" \) -printf '%T+ %p\n' 2>/dev/null | sort | head -1 | cut -d' ' -f2-)
            if [ -z "$OLDEST" ]; then
              echo "⚠️  No more files to delete"
              break
            fi
            
            echo "Deleting oldest file to free space: $(basename "$OLDEST")"
            rm -f "$OLDEST" "${OLDEST}.uploaded"
          done
          
          FINAL_SIZE=$(du -sb videos 2>/dev/null | cut -f1 || echo "0")
          FINAL_GB=$(echo "scale=2; $FINAL_SIZE / 1024 / 1024 / 1024" | bc)
          echo "Reduced artifact size to ${FINAL_GB}GB"
      

      
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            conf/
            database/
            videos/
          key: videos-${{ matrix.channel.username }}-${{ github.run_id }}-${{ github.run_attempt }}
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: db-${{ matrix.channel.username }}-${{ matrix.channel.site }}-${{ github.run_number }}
          path: database/
          retention-days: 30
          if-no-files-found: ignore
          compression-level: 9

  # Dedicated job for processing: convert, upload, delete
  # Runs independently - doesn't wait for record job to complete
  process:
    if: "!startsWith(github.ref, 'refs/tags/') && needs.setup.outputs.has-channels == 'true'"
    needs: [setup]
    runs-on: ubuntu-latest
    timeout-minutes: 720  # 12 hours - allows processing of up to 50 large files
    strategy:
      matrix:
        channel: ${{ fromJson(needs.setup.outputs.channels) }}
      fail-fast: false
      max-parallel: 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg bc jq
      
      - name: Download raw recordings
        uses: actions/cache/restore@v4
        continue-on-error: true
        with:
          path: videos/
          key: videos-${{ matrix.channel.username }}-${{ github.run_id }}-never-match
          restore-keys: |
            videos-${{ matrix.channel.username }}-${{ github.run_id }}-
            videos-${{ matrix.channel.username }}-resume-
      
      - name: Verify artifact structure
        run: |
          echo "=== Artifact Download Verification ==="
          if [ -d videos ]; then
            echo "Videos directory structure:"
            find videos -type f \( -name "*.ts" -o -name "*.mp4" -o -name "*.uploaded" \) | head -20
            
            VIDEO_COUNT=$(find videos -type f \( -name "*.ts" -o -name "*.mp4" \) 2>/dev/null | wc -l || echo "0")
            MARKER_COUNT=$(find videos -type f -name "*.uploaded" 2>/dev/null | wc -l || echo "0")
            
            echo "Found $VIDEO_COUNT video file(s)"
            echo "Found $MARKER_COUNT marker(s)"
          else
            echo "No videos directory found"
          fi
          echo "===================================="
      
      - name: Restore database
        uses: actions/cache/restore@v4
        continue-on-error: true
        with:
          path: database/
          key: state-${{ matrix.channel.username }}-${{ github.run_id }}
          restore-keys: |
            state-${{ matrix.channel.username }}-resume-
            state-${{ matrix.channel.username }}-
      
      - name: Process recordings
        run: |
          mkdir -p database/backups processed
          
          echo "=== Processing Job Started ==="
          echo "This job will run continuously for up to 12 hours, processing files as they become available"
          
          # Track start time for timeout
          JOB_START=$(date +%s)
          MAX_JOB_TIME=$((11 * 3600))  # 11 hours (leave 1 hour buffer before job timeout)
          ITERATION=0
          
          # Continuous processing loop
          PROCESSED_COUNT=0
          FAILED_COUNT=0
          
          while true; do
            ITERATION=$((ITERATION + 1))
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - JOB_START))
            
            # Check if we're approaching job timeout
            if [ $ELAPSED -gt $MAX_JOB_TIME ]; then
              echo "⏱️  Job time limit approaching (11 hours) - stopping gracefully"
              break
            fi
            
            echo ""
            echo "=== Processing Iteration #$ITERATION ($(date)) ==="
            
            # Check available disk space
            AVAILABLE_GB=$(df -BG . | awk 'NR==2 {print $4}' | sed 's/G//')
            echo "Available disk space: ${AVAILABLE_GB}GB"
            
            if [ "$AVAILABLE_GB" -lt 2 ]; then
              echo "⚠️  WARNING: Low disk space for processing (${AVAILABLE_GB}GB)"
            fi
            
            echo "Looking for completed video files to process..."
            
            # Find all video files that have .uploaded marker (limit based on max_duration)
            # Fewer files for large chunks to stay within timeout
            MAX_FILES=50
            MAX_DURATION="${{ inputs.max_duration || '45' }}"
            if [ "$MAX_DURATION" -gt 120 ]; then
              MAX_FILES=25
              echo "Large chunk size detected - limiting to 25 files per run"
            fi
            
            COMPLETED_FILES=$(find videos -type f -name "*.uploaded" 2>/dev/null | sort | head -$MAX_FILES || true)
          
          if [ -z "$COMPLETED_FILES" ]; then
            echo "No completed files found to process"
            echo ""
            echo "Debug: Checking videos directory..."
            if [ -d videos ]; then
              echo "Videos directory exists"
              ALL_VIDEOS=$(find videos -type f \( -name "*.ts" -o -name "*.mp4" \) 2>/dev/null | wc -l || echo "0")
              ALL_MARKERS=$(find videos -type f -name "*.uploaded" 2>/dev/null | wc -l || echo "0")
              echo "Total video files: $ALL_VIDEOS"
              echo "Total markers: $ALL_MARKERS"
              
              if [ "$ALL_VIDEOS" -gt 0 ] && [ "$ALL_MARKERS" -eq 0 ]; then
                echo "⚠️  WARNING: Found video files but no markers!"
                echo "This might indicate the recording job didn't complete properly."
              fi
            else
              echo "Videos directory does not exist"
            fi
            # Don't exit - continue loop to wait for files
            ITERATION_PROCESSED=0
            ITERATION_FAILED=0
          else
            
            FILE_COUNT=$(echo "$COMPLETED_FILES" | wc -l)
            echo "Found $FILE_COUNT completed file(s) to process (max $MAX_FILES per run)"
            
            # Check if jq is available
            if ! command -v jq &> /dev/null; then
              echo "Error: jq is required but not installed"
              exit 1
            fi
            
            # Check if bc is available
            if ! command -v bc &> /dev/null; then
              echo "Error: bc is required but not installed"
              exit 1
            fi
            
            # Reset counters for this iteration
            ITERATION_PROCESSED=0
            ITERATION_FAILED=0
          
            # Process each completed file
            for MARKER in $COMPLETED_FILES; do
              VIDEO_FILE="${MARKER%.uploaded}"
              CONVERT_DURATION=0  # Initialize to prevent undefined variable
              
              if [ ! -f "$VIDEO_FILE" ]; then
                echo "Warning: Marker found but file missing: $VIDEO_FILE"
                rm -f "$MARKER"
                continue
              fi
              
              # Skip empty or corrupted files
              VIDEO_SIZE_BYTES=$(stat -c%s "$VIDEO_FILE" 2>/dev/null || echo "0")
              if [ "$VIDEO_SIZE_BYTES" -lt 1024 ]; then
                echo "Warning: File too small or empty: $VIDEO_FILE (${VIDEO_SIZE_BYTES} bytes)"
                rm -f "$VIDEO_FILE" "$MARKER"
                continue
              fi
              
              BASENAME=$(basename "$VIDEO_FILE")
              FILE_EXT="${BASENAME##*.}"
              BASENAME_NO_EXT="${BASENAME%.*}"
              MP4_FILE="processed/${BASENAME_NO_EXT}.mp4"
              
              echo ""
              echo "=== Processing: $BASENAME ==="
              
              # Check disk space before processing
              AVAILABLE_GB=$(df -BG . | awk 'NR==2 {print $4}' | sed 's/G//')
              if [ "$AVAILABLE_GB" -lt 1 ]; then
                echo "⚠️  Skipping: Insufficient disk space (${AVAILABLE_GB}GB)"
                continue
              fi
              
              # For conversion, we need 2x the source file size
              # Check if we have enough space
              if [ -n "$VIDEO_SIZE_BYTES" ] && [ "$VIDEO_SIZE_BYTES" -gt 0 ]; then
                REQUIRED_GB=$(echo "scale=0; ($VIDEO_SIZE_BYTES * 2) / 1024 / 1024 / 1024 + 1" | bc 2>/dev/null || echo "2")
              else
                REQUIRED_GB=2
              fi
              
              if [ "$AVAILABLE_GB" -lt "$REQUIRED_GB" ]; then
                echo "⚠️  Skipping: Need ${REQUIRED_GB}GB for conversion, only have ${AVAILABLE_GB}GB"
                continue
              fi
              
              VIDEO_SIZE=$(du -h "$VIDEO_FILE" | cut -f1)
              echo "Input: $VIDEO_FILE ($VIDEO_SIZE)"
            
              # Step 1: Convert to MP4 if needed (skip if already MP4)
              if [ "$FILE_EXT" = "mp4" ]; then
                echo "File is already MP4, skipping conversion"
                MP4_FILE="$VIDEO_FILE"
                CONVERT_DURATION=0
              else
                echo "Converting to MP4..."
                
                # Calculate timeout based on file size (30 min + 10 min per GB over 2GB)
                if [ -n "$VIDEO_SIZE_BYTES" ] && [ "$VIDEO_SIZE_BYTES" -gt 0 ]; then
                  FILE_SIZE_GB=$(echo "scale=2; $VIDEO_SIZE_BYTES / 1024 / 1024 / 1024" | bc 2>/dev/null || echo "1")
                else
                  FILE_SIZE_GB=1
                fi
                
                CONVERT_TIMEOUT=30
                
                if (( $(echo "$FILE_SIZE_GB > 2" | bc -l) )); then
                  EXTRA_TIME=$(echo "($FILE_SIZE_GB - 2) * 10" | bc | cut -d. -f1)
                  CONVERT_TIMEOUT=$((30 + EXTRA_TIME))
                  echo "Large file (${FILE_SIZE_GB}GB) - using ${CONVERT_TIMEOUT} minute timeout"
                fi
                
                CONVERT_START=$(date +%s)
                if timeout ${CONVERT_TIMEOUT}m ffmpeg -nostdin -y -i "$VIDEO_FILE" -c copy -movflags +faststart "$MP4_FILE" 2>&1 | tail -20; then
                  CONVERT_END=$(date +%s)
                  CONVERT_DURATION=$((CONVERT_END - CONVERT_START))
                  MP4_SIZE=$(du -h "$MP4_FILE" | cut -f1)
                  echo "✓ Conversion successful: $MP4_FILE ($MP4_SIZE) in ${CONVERT_DURATION}s"
                else
                  echo "✗ Conversion failed or timed out"
                  ITERATION_FAILED=$((ITERATION_FAILED + 1))
                  FAILED_COUNT=$((FAILED_COUNT + 1))
                  # Remove marker so it can be retried
                  rm -f "$MARKER"
                  continue
                fi
              fi
            
            # Verify MP4 was created successfully
            if [ ! -f "$MP4_FILE" ]; then
              echo "✗ MP4 file not created"
              ITERATION_FAILED=$((ITERATION_FAILED + 1))
              FAILED_COUNT=$((FAILED_COUNT + 1))
              rm -f "$MARKER"
              continue
            fi
            
            # Check MP4 file size before upload
            MP4_SIZE_BYTES=$(stat -c%s "$MP4_FILE" 2>/dev/null || echo "0")
            
            if [ "$MP4_SIZE_BYTES" -lt 10240 ]; then
              echo "✗ MP4 file is too small or corrupted (${MP4_SIZE_BYTES} bytes, need >10KB)"
              rm -f "$MP4_FILE" "$MARKER"
              ITERATION_FAILED=$((ITERATION_FAILED + 1))
              FAILED_COUNT=$((FAILED_COUNT + 1))
              continue
            fi
              
              MP4_SIZE_GB=$(echo "scale=2; $MP4_SIZE_BYTES / 1024 / 1024 / 1024" | bc 2>/dev/null || echo "0")
              
              if (( $(echo "$MP4_SIZE_GB > 5" | bc -l) )); then
                echo "⚠️  WARNING: Large file (${MP4_SIZE_GB}GB) - upload may be slow"
                EST_MINUTES=$(echo "$MP4_SIZE_GB * 10" | bc 2>/dev/null || echo "60")
                echo "Estimated upload time: ~${EST_MINUTES} minutes at 10MB/s"
              fi
              
              # Check if we have enough time remaining for upload
              CURRENT_TIME=$(date +%s)
              TIME_ELAPSED=$((CURRENT_TIME - JOB_START))
              TIME_REMAINING=$((MAX_JOB_TIME - TIME_ELAPSED))
              
              # Estimate upload time (assume 2MB/s minimum) - calculate once
              if [ -n "$MP4_SIZE_BYTES" ] && [ "$MP4_SIZE_BYTES" -gt 0 ]; then
                FILE_SIZE_MB=$(echo "scale=0; $MP4_SIZE_BYTES / 1024 / 1024" | bc 2>/dev/null || echo "1")
              else
                FILE_SIZE_MB=1
              fi
              
              # Ensure FILE_SIZE_MB is at least 1 to avoid division issues
              if [ "$FILE_SIZE_MB" -lt 1 ]; then
                FILE_SIZE_MB=1
              fi
              
              ESTIMATED_UPLOAD_SECONDS=$((FILE_SIZE_MB / 2))
              ESTIMATED_UPLOAD_MINUTES=$((ESTIMATED_UPLOAD_SECONDS / 60 + 10))  # Add 10 min buffer
              
              if [ $TIME_REMAINING -lt $((ESTIMATED_UPLOAD_MINUTES * 60)) ]; then
                echo "⚠️  Skipping upload: Not enough time remaining"
                echo "Need ~${ESTIMATED_UPLOAD_MINUTES} minutes, have $((TIME_REMAINING / 60)) minutes"
                echo "File will be processed in next run"
                continue
              fi
              
              # Step 2: Upload to GoFile with retry
              echo "Uploading to GoFile..."
              
              UPLOAD_SUCCESS=false
              UPLOAD_ATTEMPTS=0
              MAX_UPLOAD_ATTEMPTS=3
              
              while [ $UPLOAD_ATTEMPTS -lt $MAX_UPLOAD_ATTEMPTS ] && [ "$UPLOAD_SUCCESS" = "false" ]; do
                UPLOAD_ATTEMPTS=$((UPLOAD_ATTEMPTS + 1))
                
                if [ $UPLOAD_ATTEMPTS -gt 1 ]; then
                  echo "Retry attempt $UPLOAD_ATTEMPTS of $MAX_UPLOAD_ATTEMPTS..."
                  sleep 5
                fi
                
                # Get best server with fallback
                echo "Getting best GoFile server..."
                SERVER_RESPONSE=$(curl -s --max-time 10 https://api.gofile.io/servers 2>/dev/null || echo "")
                
                if [ -z "$SERVER_RESPONSE" ]; then
                  SERVER="store1"
                  echo "Using fallback server: $SERVER"
                else
                  SERVER=$(echo "$SERVER_RESPONSE" | jq -r '.data.servers[0].name' 2>/dev/null || echo "store1")
                  if [ -z "$SERVER" ] || [ "$SERVER" = "null" ]; then
                    SERVER="store1"
                  fi
                  echo "Using server: $SERVER"
                fi
                
                # Calculate upload timeout based on file size (assume 2MB/s minimum)
                # Reuse FILE_SIZE_MB calculated earlier
                UPLOAD_TIMEOUT=$((FILE_SIZE_MB / 2 / 60 + 10))  # Size/2MB/s/60s + 10min buffer
                
                # Minimum 60 minutes, maximum 180 minutes
                if [ $UPLOAD_TIMEOUT -lt 60 ]; then
                  UPLOAD_TIMEOUT=60
                elif [ $UPLOAD_TIMEOUT -gt 180 ]; then
                  UPLOAD_TIMEOUT=180
                  echo "⚠️  Very large file - upload may take up to 3 hours"
                fi
                
                echo "Upload timeout: ${UPLOAD_TIMEOUT} minutes"
                
                UPLOAD_START=$(date +%s)
                
                # Upload to selected server with dynamic timeout
                UPLOAD_RESPONSE=$(timeout ${UPLOAD_TIMEOUT}m curl -X POST "https://${SERVER}.gofile.io/contents/uploadfile" \
                  -F "file=@$MP4_FILE" \
                  -w "\n%{http_code}" \
                  -s 2>/dev/null || echo "timeout\n000")
                
                HTTP_CODE=$(echo "$UPLOAD_RESPONSE" | tail -1)
                RESPONSE_BODY=$(echo "$UPLOAD_RESPONSE" | head -n -1)
                
                UPLOAD_END=$(date +%s)
                UPLOAD_DURATION=$((UPLOAD_END - UPLOAD_START))
              
                if [ "$HTTP_CODE" = "200" ]; then
                  # Validate response structure
                  if ! echo "$RESPONSE_BODY" | jq -e '.status == "ok"' >/dev/null 2>&1; then
                    ERROR_MSG=$(echo "$RESPONSE_BODY" | jq -r '.status' 2>/dev/null || echo "Invalid response structure")
                    echo "✗ GoFile API error: $ERROR_MSG"
                    echo "Response: $RESPONSE_BODY"
                    continue
                  fi
                  
                  DOWNLOAD_LINK=$(echo "$RESPONSE_BODY" | jq -r '.data.downloadPage' 2>/dev/null || echo "")
                  
                  if [ ! -z "$DOWNLOAD_LINK" ] && [ "$DOWNLOAD_LINK" != "null" ]; then
                    UPLOAD_SUCCESS=true
                    echo "✓ Upload successful!"
                    echo "  Link: $DOWNLOAD_LINK"
                    echo "  Duration: ${UPLOAD_DURATION}s"
                    
                    # Calculate upload speed
                    FILESIZE=$(stat -c%s "$MP4_FILE" 2>/dev/null || echo "0")
                    if [ $UPLOAD_DURATION -gt 0 ]; then
                      UPLOAD_SPEED=$(echo "scale=2; $FILESIZE / $UPLOAD_DURATION / 1024 / 1024" | bc 2>/dev/null || echo "0")
                      echo "  Speed: ${UPLOAD_SPEED} MB/s"
                    else
                      UPLOAD_SPEED="0"
                    fi
                    
                    # Create/update database with file locking
                    if [ ! -f database/uploads.json ]; then
                      mkdir -p database
                      echo '{"records":[]}' > database/uploads.json
                    fi
                    
                    # Use flock for database operations to prevent race conditions
                    (
                      # Wait max 30 seconds for lock
                      if flock -x -w 30 200; then
                        RECORD=$(jq -n \
                          --arg id "${{ matrix.channel.username }}_$(date +%s)_$$" \
                          --arg username "${{ matrix.channel.username }}" \
                          --arg site "${{ matrix.channel.site }}" \
                          --arg filename "$(basename "$MP4_FILE")" \
                          --arg link "$DOWNLOAD_LINK" \
                          --arg uploaded_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                          --arg filesize "$FILESIZE" \
                          --arg upload_duration "$UPLOAD_DURATION" \
                          --arg upload_speed "$UPLOAD_SPEED" \
                          --arg convert_duration "$CONVERT_DURATION" \
                          '{
                            id: $id,
                            username: $username,
                            site: $site,
                            filename: $filename,
                            gofile_link: $link,
                            uploaded_at: $uploaded_at,
                            filesize_bytes: ($filesize | tonumber),
                            upload_duration: ($upload_duration | tonumber),
                            upload_speed: ($upload_speed | tonumber),
                            convert_duration: ($convert_duration | tonumber),
                            status: "uploaded"
                          }')
                        
                        if timeout 30s jq ".records += [$RECORD]" database/uploads.json > database/uploads.json.tmp 2>/dev/null; then
                          mv database/uploads.json.tmp database/uploads.json
                          echo "✓ Database updated"
                        else
                          echo "✗ Database operation timed out or failed"
                          rm -f database/uploads.json.tmp
                        fi
                      else
                        echo "✗ Failed to acquire database lock after 30 seconds"
                      fi
                    ) 200>database/.lock
                    
                    # Step 3: Delete local files
                    echo "Deleting local files..."
                    rm -f "$VIDEO_FILE" "$MP4_FILE" "$MARKER"
                    echo "✓ Local files deleted"
                    
                    ITERATION_PROCESSED=$((ITERATION_PROCESSED + 1))
                    PROCESSED_COUNT=$((PROCESSED_COUNT + 1))
                  else
                    echo "✗ Upload failed: Invalid response"
                    echo "Response: $RESPONSE_BODY"
                  fi
                elif [ "$HTTP_CODE" = "429" ]; then
                  echo "✗ Rate limited by GoFile API"
                  # Exponential backoff for rate limits
                  BACKOFF=$((5 * UPLOAD_ATTEMPTS))
                  echo "Waiting ${BACKOFF} seconds before retry..."
                  sleep $BACKOFF
                elif [ "$HTTP_CODE" = "000" ]; then
                  echo "✗ Upload timeout or network error"
                else
                  echo "✗ Upload failed with HTTP $HTTP_CODE"
                  echo "Response: $RESPONSE_BODY"
                fi
              done
              
              if [ "$UPLOAD_SUCCESS" = "false" ]; then
                echo "✗ Upload failed after $MAX_UPLOAD_ATTEMPTS attempts"
                ITERATION_FAILED=$((ITERATION_FAILED + 1))
                FAILED_COUNT=$((FAILED_COUNT + 1))
                # Keep files for retry in next run
              fi
            fi
            done  # End of for loop processing files
            
            echo ""
            echo "=== Iteration #$ITERATION Summary ==="
            echo "Processed: $ITERATION_PROCESSED files"
            echo "Failed: $ITERATION_FAILED files"
            echo "Total processed: $PROCESSED_COUNT files"
            echo "Total failed: $FAILED_COUNT files"
            
            if [ -f database/uploads.json ]; then
              TOTAL_UPLOADS=$(jq '.records | length' database/uploads.json 2>/dev/null || echo "0")
              echo "Total uploads in database: $TOTAL_UPLOADS"
              
              # Calculate total uploaded size
              TOTAL_SIZE=$(jq '[.records[].filesize_bytes] | add // 0' database/uploads.json 2>/dev/null || echo "0")
              if [ "$TOTAL_SIZE" != "0" ] && [ "$TOTAL_SIZE" -gt 0 ]; then
                TOTAL_SIZE_GB=$(echo "scale=2; $TOTAL_SIZE / 1024 / 1024 / 1024" | bc 2>/dev/null || echo "0")
                echo "Total uploaded: ${TOTAL_SIZE_GB}GB"
              fi
              
              # Show recent uploads
              echo ""
              echo "Recent uploads:"
              jq -r '.records[-5:] | .[] | "  - \(.filename) (\(.filesize_bytes / 1024 / 1024 | floor)MB) -> \(.gofile_link)"' database/uploads.json 2>/dev/null || echo "  (none)"
            else
              echo "No database file found"
            fi
            
            # Show remaining disk space
            FINAL_AVAILABLE=$(df -BG . | awk 'NR==2 {print $4}' | sed 's/G//')
            echo ""
            echo "Final disk space: ${FINAL_AVAILABLE}GB available"
            
            # Cleanup processed directory
            if [ -d processed ]; then
              echo "Cleaning up processed directory..."
              rm -rf processed
            fi
            
            echo "============================"
          
          fi  # End of if/else block for COMPLETED_FILES check
          
          # If no files were processed, wait before next iteration
          if [ "$ITERATION_PROCESSED" -eq 0 ]; then
            echo "No files processed this iteration - waiting 2 minutes before next check..."
            sleep 120
          else
            echo "Processed $ITERATION_PROCESSED file(s) - checking for more immediately..."
            sleep 5
          fi
          
          done  # End of continuous processing loop
          
          echo ""
          echo "=== Processing Job Completed ==="
          echo "Total iterations: $ITERATION"
          echo "Job ran for $(($ELAPSED / 3600)) hours $(($ELAPSED % 3600 / 60)) minutes"
      
      - name: Save database
        uses: actions/cache/save@v4
        if: always()
        with:
          path: database/
          key: state-${{ matrix.channel.username }}-${{ github.run_id }}-processed
      
      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: processed-db-${{ matrix.channel.username }}-${{ github.run_number }}
          path: database/
          retention-days: 30
          if-no-files-found: ignore

  # Auto-restart for 24/7 - only restarts after BOTH jobs complete
  restart:
    if: "!startsWith(github.ref, 'refs/tags/') && needs.setup.outputs.has-channels == 'true'"
    needs: [setup, record, process]
    runs-on: ubuntu-latest
    steps:
      - name: Wait before restart
        run: |
          # Random delay between 30-60 seconds to avoid thundering herd
          DELAY=$((30 + RANDOM % 31))
          echo "Waiting ${DELAY} seconds before restart..."
          sleep $DELAY
      
      - uses: actions/github-script@v7
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          retries: 3
          script: |
            const maxRetries = 3;
            let lastError;
            
            // Determine the correct branch
            let branch = 'main';
            if (context.ref && context.ref.startsWith('refs/heads/')) {
              branch = context.ref.replace('refs/heads/', '');
            } else if (context.payload && context.payload.ref) {
              branch = context.payload.ref;
            }
            
            console.log(`Attempting to restart workflow on branch: ${branch}`);
            
            for (let i = 0; i < maxRetries; i++) {
              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: 'release.yml',
                  ref: branch
                });
                console.log('Successfully triggered restart');
                return;
              } catch (error) {
                lastError = error;
                console.log(`Attempt ${i + 1} failed: ${error.message}`);
                if (i < maxRetries - 1) {
                  await new Promise(resolve => setTimeout(resolve, 5000));
                }
              }
            }
            
            console.log('All restart attempts failed:', lastError.message);
            console.log('Workflow will resume on next scheduled run');
