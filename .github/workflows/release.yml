name: GoondVR

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"
    branches:
      - main
    paths:
      - '.github/channels.json'
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  # Release job - only runs on tags
  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      
      - name: Build binaries
        run: |
          mkdir -p dist
          go mod download
          GOOS=linux   GOARCH=amd64  go build -ldflags="-s -w" -o dist/linux_amd64_goondvr .
          GOOS=windows GOARCH=amd64  go build -ldflags="-s -w" -o dist/windows_amd64_goondvr.exe .
          GOOS=darwin  GOARCH=amd64  go build -ldflags="-s -w" -o dist/darwin_amd64_goondvr .
          GOOS=darwin  GOARCH=arm64  go build -ldflags="-s -w" -o dist/darwin_arm64_goondvr .
      
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
      
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: docker/setup-buildx-action@v3
      
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/heapofchaos/goondvr:latest
            ghcr.io/heapofchaos/goondvr:${{ github.ref_name }}

  # Load channels for recording
  setup:
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-latest
    outputs:
      channels: ${{ steps.load.outputs.channels }}
      has-channels: ${{ steps.load.outputs.has-channels }}
    steps:
      - uses: actions/checkout@v4
      - id: load
        run: |
          if [ ! -f .github/channels.json ]; then
            echo "channels=[]" >> $GITHUB_OUTPUT
            echo "has-channels=false" >> $GITHUB_OUTPUT
            echo "Warning: .github/channels.json not found"
            exit 0
          fi
          
          # Validate JSON syntax
          if ! jq empty .github/channels.json 2>/dev/null; then
            echo "Error: Invalid JSON in channels.json"
            echo "channels=[]" >> $GITHUB_OUTPUT
            echo "has-channels=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          CHANNELS=$(cat .github/channels.json | jq -c '.channels')
          
          # Validate channels array exists and is not empty
          if [ "$CHANNELS" = "[]" ] || [ "$CHANNELS" = "null" ] || [ -z "$CHANNELS" ]; then
            echo "channels=[]" >> $GITHUB_OUTPUT
            echo "has-channels=false" >> $GITHUB_OUTPUT
            echo "No channels configured"
          else
            # Validate each channel has required fields
            VALID_CHANNELS=$(echo "$CHANNELS" | jq -c '[.[] | select(.username != null and .username != "" and .site != null and .site != "")]')
            
            if [ "$VALID_CHANNELS" = "[]" ]; then
              echo "channels=[]" >> $GITHUB_OUTPUT
              echo "has-channels=false" >> $GITHUB_OUTPUT
              echo "No valid channels found (missing username or site)"
            else
              echo "channels=$VALID_CHANNELS" >> $GITHUB_OUTPUT
              echo "has-channels=true" >> $GITHUB_OUTPUT
              echo "Found $(echo "$VALID_CHANNELS" | jq 'length') valid channel(s)"
            fi
          fi

  # Record all channels in parallel (24/7)
  record:
    if: "!startsWith(github.ref, 'refs/tags/') && needs.setup.outputs.has-channels == 'true'"
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 330
    strategy:
      matrix:
        channel: ${{ fromJson(needs.setup.outputs.channels) }}
      fail-fast: false
      max-parallel: 20
    
    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191
        env:
          LOG_LEVEL: info
          CAPTCHA_SOLVER: none
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      
      - name: Build
        run: |
          go mod download
          go build -o goondvr .
      
      - uses: actions/cache/restore@v4
        continue-on-error: true
        with:
          path: |
            conf/
            database/
          key: state-${{ matrix.channel.username }}-${{ github.run_id }}
          restore-keys: state-${{ matrix.channel.username }}-
      
      - name: Wait for FlareSolverr
        run: |
          echo "Waiting for FlareSolverr to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:8191/v1 > /dev/null 2>&1; then
              echo "FlareSolverr is ready!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          
          # Test FlareSolverr
          echo "Testing FlareSolverr..."
          curl -s -X POST http://localhost:8191/v1 \
            -H "Content-Type: application/json" \
            -d '{"cmd":"request.get","url":"https://chaturbate.com","maxTimeout":60000}' | jq .
      
      - name: Record
        id: record
        env:
          COOKIES: ${{ secrets.CHATURBATE_COOKIES }}
          USER_AGENT: ${{ secrets.USER_AGENT }}
          FLARESOLVERR_URL: http://localhost:8191/v1
        run: |
          mkdir -p videos conf database/backups processing-queue
          
          # Sanitize cookies - remove any newlines or control characters
          CLEAN_COOKIES=$(echo "$COOKIES" | tr -d '\n\r\t' | tr -s ' ')
          CLEAN_UA=$(echo "$USER_AGENT" | tr -d '\n\r\t' | tr -s ' ')
          
          # Debug: Show cookie length (not content for security)
          echo "Cookie string length: ${#CLEAN_COOKIES}"
          echo "User agent length: ${#CLEAN_UA}"
          
          # Create settings.json - DISABLE upload, only record
          jq -n \
            --arg cookies "$CLEAN_COOKIES" \
            --arg ua "$CLEAN_UA" \
            '{
              cookies: $cookies,
              user_agent: $ua,
              finalize_mode: "none",
              ffmpeg_encoder: "libx264",
              ffmpeg_container: "mp4",
              ffmpeg_quality: 23,
              ffmpeg_preset: "medium"
            }' > conf/settings.json
          
          # Debug: Verify settings.json was created properly
          echo "Settings file created, size: $(wc -c < conf/settings.json) bytes"
          
          # Start background uploader that monitors for completed .ts files
          (
            while true; do
              sleep 60  # Check every minute
              
              # Show current recording status
              echo "=== Recording Status ($(date)) ==="
              find videos -type f -name "*.ts" -exec ls -lh {} \; 2>/dev/null || echo "No files yet"
              echo "================================"
              
              # Find .ts files that haven't been uploaded yet
              find videos -type f -name "*.ts" 2>/dev/null | while read TS_FILE; do
                if [ -f "$TS_FILE" ]; then
                  # Check if file is still being written (size changing)
                  SIZE1=$(stat -c%s "$TS_FILE" 2>/dev/null || stat -f%z "$TS_FILE" 2>/dev/null)
                  sleep 2
                  SIZE2=$(stat -c%s "$TS_FILE" 2>/dev/null || stat -f%z "$TS_FILE" 2>/dev/null)
                  
                  # If size is stable, file is complete
                  if [ "$SIZE1" = "$SIZE2" ]; then
                    MARKER="${TS_FILE}.uploaded"
                    if [ ! -f "$MARKER" ]; then
                      echo "Marking completed file for upload: $(basename "$TS_FILE")"
                      touch "$MARKER"
                    fi
                  fi
                fi
              done
            done
          ) &
          UPLOADER_PID=$!
          
          # Record without conversion/upload - just save .ts files
          timeout 5h ./goondvr \
            -u "${{ matrix.channel.username }}" \
            --site "${{ matrix.channel.site }}" \
            -resolution 9999 \
            -framerate 60 \
            -interval 1 \
            -max-duration 240 \
            -max-filesize 0 \
            --debug || {
              echo "Recording ended with code $?"
              echo "This is normal - streamer may be offline or timeout reached"
            }
          
          # Stop the background uploader
          kill $UPLOADER_PID 2>/dev/null || true
          
          # Mark any remaining files as complete
          find videos -type f -name "*.ts" 2>/dev/null | while read TS_FILE; do
            if [ -f "$TS_FILE" ]; then
              touch "${TS_FILE}.uploaded"
              echo "Marked: $(basename "$TS_FILE")"
            fi
          done
          
          # List completed recordings
          echo "=== Completed Recordings ==="
          echo "Videos directory contents:"
          ls -laR videos/ 2>/dev/null || echo "Videos directory not found or empty"
          echo ""
          echo "All .ts files:"
          find videos -type f -name "*.ts" -exec ls -lh {} \; 2>/dev/null || echo "No .ts files found"
          echo ""
          echo "All .uploaded markers:"
          find videos -type f -name "*.uploaded" -exec ls -lh {} \; 2>/dev/null || echo "No .uploaded markers found"
          echo "======================"
      
      - name: Upload raw recordings for processing
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-videos-${{ matrix.channel.username }}-${{ github.run_number }}
          path: |
            videos/**/*.ts
            videos/**/*.uploaded
          retention-days: 1
          if-no-files-found: ignore
          compression-level: 0
      
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            conf/
            database/
          key: state-${{ matrix.channel.username }}-${{ github.run_id }}
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: db-${{ matrix.channel.username }}-${{ matrix.channel.site }}-${{ github.run_number }}
          path: database/
          retention-days: 30
          if-no-files-found: ignore
          compression-level: 9

  # Dedicated job for processing: convert, upload, delete
  process:
    if: "!startsWith(github.ref, 'refs/tags/') && needs.setup.outputs.has-channels == 'true' && always()"
    needs: [setup, record]
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      matrix:
        channel: ${{ fromJson(needs.setup.outputs.channels) }}
      fail-fast: false
      max-parallel: 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      
      - name: Download raw recordings
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: raw-videos-${{ matrix.channel.username }}-${{ github.run_number }}
          path: videos/
      
      - name: Restore database
        uses: actions/cache/restore@v4
        continue-on-error: true
        with:
          path: database/
          key: state-${{ matrix.channel.username }}-${{ github.run_id }}
          restore-keys: state-${{ matrix.channel.username }}-
      
      - name: Process recordings
        run: |
          mkdir -p database/backups processed
          
          echo "=== Processing Job Started ==="
          echo "Looking for completed .ts files to process..."
          
          # Find all .ts files that have .uploaded marker (limit to 100 per run)
          COMPLETED_FILES=$(find videos -type f -name "*.uploaded" 2>/dev/null | head -100 || true)
          
          if [ -z "$COMPLETED_FILES" ]; then
            echo "No completed files found to process"
            exit 0
          fi
          
          FILE_COUNT=$(echo "$COMPLETED_FILES" | wc -l)
          echo "Found $FILE_COUNT completed file(s) to process (max 100 per run)"
          
          # Check if jq is available
          if ! command -v jq &> /dev/null; then
            echo "Error: jq is required but not installed"
            exit 1
          fi
          
          # Process each completed file
          for MARKER in $COMPLETED_FILES; do
            TS_FILE="${MARKER%.uploaded}"
            
            if [ ! -f "$TS_FILE" ]; then
              echo "Warning: Marker found but file missing: $TS_FILE"
              continue
            fi
            
            BASENAME=$(basename "$TS_FILE" .ts)
            MP4_FILE="processed/${BASENAME}.mp4"
            
            echo ""
            echo "=== Processing: $BASENAME ==="
            echo "Input: $TS_FILE ($(du -h "$TS_FILE" | cut -f1))"
            
            # Step 1: Convert to MP4
            echo "Converting to MP4..."
            if ffmpeg -nostdin -y -i "$TS_FILE" -c copy -movflags +faststart "$MP4_FILE" 2>&1 | tail -20; then
              echo "✓ Conversion successful: $MP4_FILE ($(du -h "$MP4_FILE" | cut -f1))"
              
              # Step 2: Upload to GoFile
              echo "Uploading to GoFile..."
              
              # Get best server
              echo "Getting best GoFile server..."
              SERVER_RESPONSE=$(curl -s https://api.gofile.io/servers)
              SERVER=$(echo "$SERVER_RESPONSE" | jq -r '.data.servers[0].name' 2>/dev/null || echo "store1")
              echo "Using server: $SERVER"
              
              UPLOAD_START=$(date +%s)
              
              # Upload to selected server
              UPLOAD_RESPONSE=$(curl -X POST "https://${SERVER}.gofile.io/contents/uploadfile" \
                -F "file=@$MP4_FILE" \
                -w "\n%{http_code}" \
                -s)
              
              HTTP_CODE=$(echo "$UPLOAD_RESPONSE" | tail -1)
              RESPONSE_BODY=$(echo "$UPLOAD_RESPONSE" | head -n -1)
              
              UPLOAD_END=$(date +%s)
              UPLOAD_DURATION=$((UPLOAD_END - UPLOAD_START))
              
              if [ "$HTTP_CODE" = "200" ]; then
                DOWNLOAD_LINK=$(echo "$RESPONSE_BODY" | jq -r '.data.downloadPage' 2>/dev/null || echo "")
                
                if [ ! -z "$DOWNLOAD_LINK" ] && [ "$DOWNLOAD_LINK" != "null" ]; then
                  echo "✓ Upload successful!"
                  echo "  Link: $DOWNLOAD_LINK"
                  echo "  Duration: ${UPLOAD_DURATION}s"
                  
                  # Save to database
                  FILESIZE=$(stat -f%z "$MP4_FILE" 2>/dev/null || stat -c%s "$MP4_FILE" 2>/dev/null || echo "0")
                  UPLOAD_SPEED=$(echo "scale=2; $FILESIZE / $UPLOAD_DURATION / 1024 / 1024" | bc 2>/dev/null || echo "0")
                  
                  # Create/update database
                  if [ ! -f database/uploads.json ]; then
                    echo '{"records":[]}' > database/uploads.json
                  fi
                  
                  RECORD=$(jq -n \
                    --arg id "${{ matrix.channel.username }}_$(date +%s)" \
                    --arg username "${{ matrix.channel.username }}" \
                    --arg site "${{ matrix.channel.site }}" \
                    --arg filename "$BASENAME.mp4" \
                    --arg link "$DOWNLOAD_LINK" \
                    --arg uploaded_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                    --arg filesize "$FILESIZE" \
                    --arg upload_duration "$UPLOAD_DURATION" \
                    --arg upload_speed "$UPLOAD_SPEED" \
                    '{
                      id: $id,
                      username: $username,
                      site: $site,
                      filename: $filename,
                      gofile_link: $link,
                      uploaded_at: $uploaded_at,
                      filesize_bytes: ($filesize | tonumber),
                      upload_duration: ($upload_duration | tonumber),
                      upload_speed: ($upload_speed | tonumber),
                      status: "uploaded"
                    }')
                  
                  jq ".records += [$RECORD]" database/uploads.json > database/uploads.json.tmp
                  mv database/uploads.json.tmp database/uploads.json
                  
                  # Step 3: Delete local files
                  echo "Deleting local files..."
                  rm -f "$TS_FILE" "$MP4_FILE"
                  echo "✓ Local files deleted"
                else
                  echo "✗ Upload failed: Invalid response"
                  echo "Response: $RESPONSE_BODY"
                fi
              else
                echo "✗ Upload failed with HTTP $HTTP_CODE"
                echo "Response: $RESPONSE_BODY"
              fi
            else
              echo "✗ Conversion failed"
            fi
          done
          
          echo ""
          echo "=== Processing Complete ==="
          if [ -f database/uploads.json ]; then
            echo "Total uploads: $(jq '.records | length' database/uploads.json)"
          fi
      
      - name: Save database
        uses: actions/cache/save@v4
        if: always()
        with:
          path: database/
          key: state-${{ matrix.channel.username }}-${{ github.run_id }}-processed
      
      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: processed-db-${{ matrix.channel.username }}-${{ github.run_number }}
          path: database/
          retention-days: 30
          if-no-files-found: ignore

  # Auto-restart for 24/7
  restart:
    if: "!startsWith(github.ref, 'refs/tags/') && (success() || failure()) && needs.setup.outputs.has-channels == 'true'"
    needs: [setup, record, process]
    runs-on: ubuntu-latest
    steps:
      - name: Wait before restart
        run: sleep 30
      
      - uses: actions/github-script@v7
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          retries: 3
          script: |
            const maxRetries = 3;
            let lastError;
            
            for (let i = 0; i < maxRetries; i++) {
              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: 'release.yml',
                  ref: context.ref.replace('refs/heads/', '') || 'main'
                });
                console.log('Successfully triggered restart');
                return;
              } catch (error) {
                lastError = error;
                console.log(`Attempt ${i + 1} failed: ${error.message}`);
                if (i < maxRetries - 1) {
                  await new Promise(resolve => setTimeout(resolve, 5000));
                }
              }
            }
            
            console.log('All restart attempts failed:', lastError.message);
            console.log('Workflow will resume on next scheduled run');
